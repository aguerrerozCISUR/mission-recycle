<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Recycle V2.4</title>
    <!-- Librerías de TensorFlow y Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <!-- Tailwind CSS para estilos modernos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        #hero { transition: left 1.5s ease-in-out; }
        #trash { transition: all 1.2s ease-in-out; }
        
        #webcam canvas {
            width: 100% !important;
            height: auto !important;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-top: 0.5rem;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: float 40s linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud::after { width: 40px; height: 40px; top: -15px; right: 15px; }

        @keyframes float {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(100vw); }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-300 to-cyan-100 h-screen w-full relative">

    <div id="scene" class="relative w-full h-full">
        
        <div class="cloud w-32 h-10 top-20 left-[-100px]" style="animation-delay: 0s;"></div>
        <div class="cloud w-40 h-12 top-40 left-[-200px]" style="animation-delay: -15s; animation-duration: 55s;"></div>
        <div class="cloud w-28 h-8 top-10 left-[-150px]" style="animation-delay: -30s; animation-duration: 35s;"></div>

        <div id="overlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm flex flex-col justify-center items-center text-white z-50 transition-opacity duration-500">
            <div class="text-6xl mb-4 animate-bounce">🌍</div>
            <h1 class="text-4xl md:text-5xl font-bold mb-8 text-center drop-shadow-lg">Mission: Recycle!</h1>
            <button id="startBtn" class="px-8 py-4 text-2xl font-bold rounded-full bg-yellow-400 text-yellow-900 hover:bg-yellow-300 hover:scale-105 active:scale-95 transition-all shadow-lg border-4 border-yellow-200">
                INICIAR
            </button>
            <p id="errorMsg" class="mt-4 text-red-300 text-center px-6 hidden font-medium bg-red-900/50 py-2 rounded-lg"></p>
        </div>

        <div id="panel" class="glass-panel absolute top-4 left-4 p-4 rounded-2xl shadow-xl w-[90vw] max-w-[320px] z-10">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-xl font-bold text-gray-800">🤖 EcoBot</h3>
                <div id="score" class="bg-yellow-400 text-yellow-900 font-bold px-3 py-1 rounded-full text-sm shadow-sm">
                    ⭐ 0 puntos
                </div>
            </div>
            <div id="speech" class="text-sm text-gray-600 bg-gray-100 p-2 rounded-lg mb-3 border border-gray-200 min-h-[40px] flex items-center">
                Pulsa INICIAR.
            </div>
            <div id="webcam" class="w-full bg-black/5 rounded-xl min-h-[160px] flex items-center justify-center overflow-hidden relative">
                <span id="camPlaceholder" class="text-gray-400 text-sm absolute">Cámara apagada</span>
            </div>
            <div id="pred" class="mt-3 text-center text-lg text-gray-700 h-6 font-medium"></div>
        </div>

        <div id="hero" class="absolute bottom-[160px] left-[5%] text-6xl md:text-7xl z-20 drop-shadow-md">🧒</div>
        
        <div id="trash" class="absolute opacity-0 text-5xl md:text-6xl z-30 drop-shadow-md" style="bottom: 250px; left: 10%;">🍌</div>
        
        <div class="bin absolute bottom-[160px] left-[55%] flex flex-col items-center z-10" id="organic">
            <div class="text-6xl md:text-7xl drop-shadow-lg">🟢🗑️</div>
            <div class="bg-green-600 text-white text-xs font-bold px-2 py-1 rounded-md mt-1 shadow-sm">ORGÁNICO</div>
        </div>
        
        <div class="bin absolute bottom-[160px] left-[80%] flex flex-col items-center z-10" id="inorganic">
            <div class="text-6xl md:text-7xl drop-shadow-lg">⚪🗑️</div>
            <div class="bg-gray-500 text-white text-xs font-bold px-2 py-1 rounded-md mt-1 shadow-sm">INORGÁNICO</div>
        </div>

        <div id="ground" class="absolute bottom-0 w-full h-[180px] bg-gradient-to-t from-green-600 to-green-400 border-t-4 border-green-700 z-0"></div>
    </div>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/A1mcWRVWR/";
        let model, cam, score = 0, busy = false;
        let vozDesbloqueada = false; // Variable para controlar si el navegador ya dio permiso

        document.getElementById("startBtn").addEventListener("click", iniciarJuego);

        function desbloquearVoz() {
            if (!vozDesbloqueada && 'speechSynthesis' in window) {
                // Truco: Hablar un texto vacío al instante de hacer clic para ganar el permiso
                const unlock = new SpeechSynthesisUtterance('');
                unlock.volume = 0; // Silencio
                window.speechSynthesis.speak(unlock);
                vozDesbloqueada = true;
            }
        }

        function hablar(t) {
            document.getElementById("speech").textContent = t;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(t);
                u.lang = "es-ES";
                u.volume = 1; // Asegurar volumen al máximo
                window.speechSynthesis.speak(u);
            }
        }

        function mostrarError(mensaje) {
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.textContent = mensaje;
            errorMsg.classList.remove("hidden");
            document.getElementById("startBtn").textContent = "REINTENTAR";
            document.getElementById("startBtn").disabled = false;
        }

        async function iniciarJuego() {
            desbloquearVoz(); // IMPORTANTE: Ejecutar esto justo en el evento click
            
            const startBtn = document.getElementById("startBtn");
            const overlay = document.getElementById("overlay");
            const camPlaceholder = document.getElementById("camPlaceholder");
            
            startBtn.disabled = true;
            document.getElementById("errorMsg").classList.add("hidden");
            
            hablar("Cargando modelo...");
            
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                
                cam = new tmImage.Webcam(300, 300, true);
                await cam.setup();
                await cam.play();
                
                const webcamContainer = document.getElementById("webcam");
                if (camPlaceholder) camPlaceholder.remove();
                webcamContainer.innerHTML = ''; 
                webcamContainer.appendChild(cam.canvas);
                
                overlay.style.opacity = "0";
                setTimeout(() => overlay.style.display = "none", 500);
                
                hablar("Busca un residuo.");
                requestAnimationFrame(loop);
                
            } catch (e) {
                console.error(e);
                mostrarError("Error técnico: " + (e.message || "Desconocido") + ". Revisa HTTPS y permisos.");
            }
        }

        async function loop() {
            cam.update();
            const res = await model.predict(cam.canvas);
            
            let best = res.reduce((a, b) => a.probability > b.probability ? a : b);
            
            const probPercent = Math.round(best.probability * 100);
            document.getElementById("pred").innerHTML = 
                `<span class="font-bold text-blue-600">${best.className}</span> 
                 <span class="text-sm text-gray-500 ml-1">(${probPercent}%)</span>`;
            
            if (best.probability > 0.92 && !busy && best.className.trim() !== "Fondo") { 
                busy = true;
                animar(best.className.trim());
                setTimeout(() => busy = false, 3000); 
            }
            
            requestAnimationFrame(loop);
        }

        function animar(clase) {
            const hero = document.getElementById("hero");
            const trash = document.getElementById("trash");
            const c = clase.toUpperCase();

            let esOrganico = c.includes("ORGANIC") && !c.includes("IN"); 
            let posObjetivo = esOrganico ? "55%" : "80%";
            
            hero.style.left = posObjetivo;
            
            if (esOrganico) {
                trash.textContent = ["🍌", "🍎", "🥕", "🥬"][Math.floor(Math.random() * 4)];
                hablar("¡Excelente! Orgánico.");
            } else {
                trash.textContent = ["🥤", "🧴", "🥫", "📦"][Math.floor(Math.random() * 4)];
                hablar("¡Muy bien! Inorgánico.");
            }

            setTimeout(() => {
                trash.style.left = hero.style.left;
                trash.style.opacity = 1;
                trash.style.bottom = "250px"; 
            }, 800); 

            setTimeout(() => {
                trash.style.bottom = "165px"; 
            }, 1100);

            setTimeout(() => {
                trash.style.opacity = 0;
                hero.style.left = "5%"; 
                
                score += 10;
                const scoreEl = document.getElementById("score");
                scoreEl.textContent = "⭐ " + score + " puntos";
                
                scoreEl.classList.add("scale-125");
                setTimeout(() => scoreEl.classList.remove("scale-125"), 200);
                
            }, 2200);
        }
    </script>
</body>
</html>
